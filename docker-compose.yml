services:
  db:
    image: postgres:16-alpine
    container_name: transitops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transitops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transitops_secret}
      POSTGRES_DB: ${POSTGRES_DB:-transitops}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-transitops} -d ${POSTGRES_DB:-transitops}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transitops-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://${POSTGRES_USER:-transitops}:${POSTGRES_PASSWORD:-transitops_secret}@db:5432/${POSTGRES_DB:-transitops}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_dev_only}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_dev_only}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local

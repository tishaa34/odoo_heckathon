# Nginx config for the TransitOps SPA.
# Serves the built static assets and reverse-proxies /api to the backend
# container so the browser talks to a single origin (no CORS needed).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip for text assets
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
  gzip_min_length 1024;

  # Long-cache fingerprinted assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy API calls to the backend service (name from docker-compose).
  location /api/ {
    proxy_pass ${API_UPSTREAM};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # SPA fallback — every unknown route serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
